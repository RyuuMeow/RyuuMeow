name: 生成 GitHub 成就獎杯

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate trophy svg
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          output_path: trophy.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move file to dist directory
        run: |
          mkdir -p dist
          mv trophy.svg dist/

      - name: Upload the generated trophy file
        uses: actions/upload-artifact@v4
        with:
          name: profile-trophy
          path: dist/

      - name: Commit and push if changed
        run: |
          git config --global user.name "${{ github.repository_owner }}"
          git config --global user.email "ryuumeow@synapsecore.net"
          git add dist/
          git commit -m "Update profile trophy" || echo "No changes to commit"
          git push
