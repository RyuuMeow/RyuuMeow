name: 生成貢獻貪吃蛇

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3.3.0
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            github-contribution-grid-snake.svg?color_snake=#FFD37A&color_dots=#161B22,#4A3408,#8C6213,#CC8E1E,#FFB454
            github-contribution-grid-snake.gif?color_snake=#FFD37A&color_dots=#161B22,#4A3408,#8C6213,#CC8E1E,#FFB454&color_background=#0D1117

      - name: Move files to dist directory
        run: |
          mkdir -p dist
          mv github-contribution-grid-snake.svg dist/
          mv github-contribution-grid-snake.gif dist/

      - name: Upload the generated snake files
        uses: actions/upload-artifact@v4
        with:
          name: contribution-snake
          path: dist/

      - name: Commit and push if changed
        run: |
          git config --global user.name "${{ github.repository_owner }}"
          git config --global user.email "ryuumeow@synapsecore.net"
          git add dist/
          git commit -m "Update contribution snake animation" || echo "No changes to commit"
          git push
